services:
  - type: web
    name: push-notification-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
